apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: qwen3-8b-instruct-pd
  annotations:
    # RoCE network required for KV cache transfer via RDMA
    k8s.v1.cni.cncf.io/networks: rdma-network
spec:
  # Main/decode pool replica count
  replicas: 1
  model:
    uri: oci://registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:latest
    name: RedHatAI/Qwen3-8B-FP8-dynamic
  router:
    route: { }
    gateway: { }
    scheduler: { }
  template:
    initContainers:
      - name: copy-model
        image: registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:latest
        command: ["sh", "-c", "cp -r /models/* /mnt/models/ && echo 'Model copy complete'"]
        volumeMounts:
          - name: model-store
            mountPath: /mnt/models
    volumes:
      - name: model-store
        emptyDir: {}
    containers:
      - name: main
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          capabilities:
            add:
            - IPC_LOCK
        volumeMounts:
          - name: model-store
            mountPath: /mnt/models
        env:
          # Enable RDMA for KV cache transfer
          - name: KSERVE_INFER_ROCE
            value: "false"
          # Pod IP for KV transfer side channel
          - name: VLLM_NIXL_SIDE_CHANNEL_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          # Enable KV cache transfer via NixlConnector (RDMA-based)
          - name: VLLM_ADDITIONAL_ARGS
            value: "--kv_transfer_config '{\"kv_connector\":\"NixlConnector\",\"kv_role\":\"kv_both\"}'"
          # UCX configuration for RDMA transport
          - name: UCX_PROTO_INFO
            value: "y"
          - name: UCX_LOG_LEVEL
            value: "info"
        resources:
          limits:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: "1"
            openshift.io/rdma: 1
          requests:
            cpu: '2'
            memory: 16Gi
            nvidia.com/gpu: "1"
            openshift.io/rdma: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
  prefill:
    # Prefill pool replica count (higher for concurrent prefill requests)
    replicas: 2
    template:
      initContainers:
        - name: copy-model
          image: registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:latest
          command: ["sh", "-c", "cp -r /models/* /mnt/models/ && echo 'Model copy complete'"]
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
      volumes:
        - name: model-store
          emptyDir: {}
      containers:
        - name: main
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
              - IPC_LOCK
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
          env:
            - name: KSERVE_INFER_ROCE
              value: "false"
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VLLM_ADDITIONAL_ARGS
              value: "--kv_transfer_config '{\"kv_connector\":\"NixlConnector\",\"kv_role\":\"kv_both\"}'"
            - name: UCX_PROTO_INFO
              value: "y"
            - name: UCX_LOG_LEVEL
              value: "info"
          resources:
            limits:
              cpu: '4'
              memory: 32Gi
              nvidia.com/gpu: "1"
              openshift.io/rdma: 1
            requests:
              cpu: '2'
              memory: 16Gi
              nvidia.com/gpu: "1"
              openshift.io/rdma: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5