apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-bench-1-1-granite-sat
  #namespace: varun-benchmark
  #labels:
  #  benchmark.ibm/owner: varun
  #  benchmark.ibm/experiment: "1.1"
  #  benchmark.ibm/model: "granite4-7b-tiny"
  #  benchmark.ibm/profile: "concurrent"
  #  benchmark.ibm/goal: "saturation-observation"
spec:
  activeDeadlineSeconds: 7200
  template:
    metadata:
      #labels:
      #  benchmark.ibm/owner: varun
      #  benchmark.ibm/experiment: "1.1"
      #  benchmark.ibm/model: "granite4-7b-tiny"
      #  benchmark.ibm/profile: "concurrent"
      #  benchmark.ibm/goal: "saturation-observation"
    spec:
      containers:
      - name: guidellm
        image: ghcr.io/vllm-project/guidellm:v0.6.0
        env:
        - name: HOME
          value: /results
        - name: HF_HOME
          value: /results/.cache
        - name: TOKENIZERS_PARALLELISM
          value: "false"
        - name: GUIDELLM_TARGET
          value: https://granite4-7b-tiny-nvidia-r4-tp1-kserve-workload-svc.vinod.svc.cluster.local:8000
        - name: GUIDELLM_MODEL
          value: ibm-granite/granite-4.0-h-tiny
        - name: GUIDELLM_PROCESSOR
          value: ibm-granite/granite-4.0-h-tiny
        - name: GUIDELLM_RATE
          value: "100,200,300,400,500,600,700,800,900,1000"
          #value: "10,50,100"
        - name: GUIDELLM_MAX_REQUESTS
          value: "2000"
        - name: GUIDELLM_MAX_SECONDS
          value: "300"
        - name: GUIDELLM_DATASET
          value: HuggingFaceH4/ultrachat_200k
        - name: GUIDELLM_DATASET_SPLIT
          value: train_sft
        - name: GUIDELLM_DATA_BUILD_SAMPLES
          value: "2000"
        - name: GUIDELLM_DATA_SAMPLES
          value: "2000"
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -eu

            python -m pip install --no-cache-dir -q datasets
            python - <<'PY'
            import json
            import os
            import sys
            from datasets import load_dataset

            dataset = os.environ.get("GUIDELLM_DATASET", "HuggingFaceH4/ultrachat_200k")
            split = os.environ.get("GUIDELLM_DATASET_SPLIT", "train_sft")
            limit = int(os.environ.get("GUIDELLM_DATA_BUILD_SAMPLES", "5000"))

            try:
                stream = load_dataset(dataset, split=split, streaming=True)
            except Exception as exc:
                print(f"Failed to load dataset {dataset}:{split}: {exc}", file=sys.stderr)
                sys.exit(1)

            written = 0
            with open("/tmp/prompts.jsonl", "w", encoding="utf-8") as f:
                for row in stream:
                    conv = row.get("messages") or row.get("conversation") or []
                    prompt = None
                    for turn in conv:
                        if str(turn.get("role", "")).lower() == "user":
                            text = (turn.get("content") or "").strip()
                            if text:
                                prompt = text
                                break
                    if not prompt:
                        continue
                    f.write(json.dumps({"prompt": prompt}, ensure_ascii=False) + "\n")
                    written += 1
                    if written >= limit:
                        break

            if written == 0:
                print("No prompts extracted from dataset", file=sys.stderr)
                sys.exit(1)
            print(f"Built /tmp/prompts.jsonl with {written} prompts")
            
            
            
            import os
            import sys
            import httpx

            target = os.environ["GUIDELLM_TARGET"].rstrip("/")
            model = os.environ["GUIDELLM_MODEL"]
            timeout = httpx.Timeout(60.0, connect=5.0)

            try:
                with httpx.Client(http2=True, verify=False, timeout=timeout) as client:
                    models = client.get(f"{target}/v1/models")
                    models.raise_for_status()
                    if "data" not in models.json():
                        raise ValueError("/v1/models response missing data")

                    completion = client.post(
                        f"{target}/v1/chat/completions",
                        json={
                            "model": model,
                            "messages": [{"role": "user", "content": "ping"}],
                            "max_tokens": 8,
                            "stream": False,
                        },
                    )
                    completion.raise_for_status()
                    if "choices" not in completion.json():
                        raise ValueError("/v1/chat/completions response missing choices")
            except Exception as exc:
                print(f"GuideLLM preflight failed for {target}: {exc}", file=sys.stderr)
                sys.exit(1)

            print(f"GuideLLM preflight passed for {target}")
            PY

            exec guidellm benchmark run \
              --target "${GUIDELLM_TARGET}" \
              --model "${GUIDELLM_MODEL}" \
              --processor "${GUIDELLM_PROCESSOR}" \
              --profile "concurrent" \
              --rate "${GUIDELLM_RATE}" \
              --max-seconds "${GUIDELLM_MAX_SECONDS}" \
              --max-requests "${GUIDELLM_MAX_REQUESTS}" \
              --max-errors "1000" \
              --data "/tmp/prompts.jsonl" \
              --data-samples "${GUIDELLM_DATA_SAMPLES}" \
              --output-dir "/results" \
              --outputs "1-1-granite4-7b-tiny-r4-tp1-concurrent-saturation-100-1000.json,1-1-granite4-7b-tiny-r4-tp1-concurrent-saturation-100-1000.html,1-1-granite4-7b-tiny-r4-tp1-concurrent-saturation-100-1000.csv" \
              --backend-kwargs "{\"validate_backend\": false, \"timeout\": 600.0}"
        volumeMounts:
        - name: results-volume
          mountPath: /results
      volumes:
      - name: results-volume
        persistentVolumeClaim:
          claimName: guidellm-results-pvc
      restartPolicy: Never
  backoffLimit: 1
