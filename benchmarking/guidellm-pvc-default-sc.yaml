# Use this if you need the cluster default StorageClass (omit storageClassName).
# Some projects cannot bind lvms-h100nvl-node-01-sdb; ask admin which SC to use: oc get storageclass
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: guidellm-results-pvc-varun
  namespace: varun-benchmark
  labels:
    benchmark.ibm/owner: varun
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
