apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-benchmark-job
  namespace: vinod
spec:
  template:
    spec:
      containers:
      - name: guidellm
        image: ghcr.io/vllm-project/guidellm:v0.6.0
        env:
        #- name: HF_TOKEN
        #  valueFrom:
        #    secretKeyRef:
        #      name: huggingface-secret
        #      key: hf_token
        - name: HOME
          value: /results
        - name: HF_HOME
          value: /results/.cache
        command: ["guidellm"]
        args:
        - "benchmark"
        - "run"
        - "--target"
        # Use in-cluster service DNS instead of external route hostname.
        - "http://qwen2-7b-instruct-nvidia-epp-service.vinod.svc.cluster.local:9002"
        - "--model"
        - "Qwen/Qwen2.5-7B-Instruct"
        - "--processor"
        - "Qwen/Qwen2.5-7B-Instruct"
        - "--data"
        - "garage-bAInd/Open-Platypus"
        #- '{"prompt_tokens":1000,"output_tokens":1000}'
        - "--rate-type"
        - "concurrent"
        - "--max-seconds"
        - "300"
        - "--rate"
        - "1,2,4"
        - "--output-dir"
        - "/results"
        - "--outputs"
        - "benchmark-results.json,benchmark-results.html"
        # Skip backend HTTP validation at startup (benchmark requests may still fail if service is down).
        - "--backend-kwargs"
        - "{\"api_key\": \"sha256~xxxxxxxxxx\", \"validate_backend\": false}"
        volumeMounts:
        - name: results-volume
          mountPath: /results
      volumes:
      - name: results-volume
        persistentVolumeClaim:
          claimName: guidellm-results-pvc
      restartPolicy: Never
  backoffLimit: 1